campaign: cosmos-search-ads
platform: google_search

data_source:
  type: mcp
  customer_id: "9232939339"
  date_range: last_30_days  # last_7_days | last_14_days | last_30_days | custom
  # start_date: "2026-04-01"
  # end_date: "2026-04-07"

# Campaign names to filter MCP queries
campaigns:
  - gg_nam_dg_search_brand_cosmos
  - gg_nam_dg_search_competitor_cosmos
  - gg_nam_dg_search_generic_codereview_cosmos
  - gg_nam_dg_search_generic_cosmos
  - gg_nam_dg_search_generic_platform_cosmos
  - gg_nam_dg_search_solutions_code_review_cosmos
  - gg_nam_dg_search_solutions_incident_management_cosmos

constraints:
  headline_max_chars: 30
  description_max_chars: 90

metrics:
  primary: conversion_rate    # conversions / clicks
  secondary: cost_per_conversion  # cost / conversions

thresholds:
  winner: 0.20       # >= 20% improvement in conversion_rate
  loser: -0.20       # >= 20% decline in conversion_rate
  min_impressions: 100

ad_groups:
  # Brand (gg_nam_dg_search_brand_cosmos)
  exact:
    campaign_type: brand
    intent: navigational
  phrase:
    campaign_type: brand
    intent: navigational

  # Competitor (gg_nam_dg_search_competitor_cosmos)
  Blitzy:
    campaign_type: competitor
    intent: competitor
  claude_code:
    campaign_type: competitor
    intent: competitor
  copilot:
    campaign_type: competitor
    intent: competitor
  cursor:
    campaign_type: competitor
    intent: competitor
  devin:
    campaign_type: competitor
    intent: competitor
  factory:
    campaign_type: competitor
    intent: competitor
  openai_codex:
    campaign_type: competitor
    intent: competitor

  # Generic — product theme (gg_nam_dg_search_generic_cosmos)
  agent_platform:
    campaign_type: generic
    intent: category
  agentic_dev:
    campaign_type: generic
    intent: category
  background_agents:
    campaign_type: generic
    intent: capability
  coding_agent:
    campaign_type: generic
    intent: capability

  # Generic — platform (gg_nam_dg_search_generic_platform_cosmos)
  internal_dev_platform:
    campaign_type: generic
    intent: category

  # Generic — code review (gg_nam_dg_search_generic_codereview_cosmos)
  code_review:
    campaign_type: generic
    intent: capability
  pull_request:
    campaign_type: generic
    intent: capability

  # Solutions (live campaigns discovered 2026-06-23)
  code_review_solutions_adgroup:
    campaign_type: solutions
    intent: code_review
  incident_management_solutions_adgroup:
    campaign_type: solutions
    intent: incident_management

# MCP query fields — used by program.md to build queries
mcp_fields:
  campaign:
    - campaign.name
    - campaign.id
    - campaign.status
    - campaign.bidding_strategy_type
    - metrics.impressions
    - metrics.clicks
    - metrics.ctr
    - metrics.cost_micros
    - metrics.average_cpc
    - metrics.conversions
    - metrics.conversions_value
    - metrics.cost_per_conversion
    - metrics.search_impression_share
    - metrics.search_budget_lost_impression_share
    - metrics.search_rank_lost_impression_share

  ad_group:
    - ad_group.name
    - ad_group.id
    - ad_group.status
    - ad_group.campaign
    - campaign.name
    - metrics.impressions
    - metrics.clicks
    - metrics.ctr
    - metrics.cost_micros
    - metrics.average_cpc
    - metrics.conversions
    - metrics.cost_per_conversion

  keyword:
    - ad_group_criterion.keyword.text
    - ad_group_criterion.keyword.match_type
    - ad_group.name
    - campaign.name
    - metrics.impressions
    - metrics.clicks
    - metrics.ctr
    - metrics.cost_micros
    - metrics.conversions

  search_term:
    - search_term_view.search_term
    - search_term_view.status
    - ad_group.name
    - campaign.name
    - metrics.impressions
    - metrics.clicks
    - metrics.ctr
    - metrics.cost_micros
    - metrics.conversions

  asset:
    - asset.text_asset.text
    - asset.id
    - ad_group.name
    - ad_group_ad_asset_view.field_type
    - campaign.name
    - metrics.impressions
    - metrics.clicks
    - metrics.ctr
    - metrics.conversions
